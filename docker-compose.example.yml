# StackVault — docker-compose.example.yml
# ──────────────────────────────────────────────────────────────────────────────
# Ce fichier est un EXEMPLE de déploiement avec une base PostgreSQL existante.
# Copiez-le sous docker-compose.yml et adaptez les variables d'environnement.
#
# IMPORTANT : PostgreSQL n'est PAS lancé ici car il est déjà hébergé ailleurs.
# Pointez DATABASE_URL vers votre instance PostgreSQL existante.
# ──────────────────────────────────────────────────────────────────────────────

services:
  stackvault:
    image: stackvault:latest
    # Pour builder localement :
    # build: .
    container_name: stackvault
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # ── Base de données PostgreSQL externe ─────────────────────────────────
      DATABASE_URL: "postgresql://user:password@your-postgres-host:5432/stackvault"

      # ── URL publique de l'application ──────────────────────────────────────
      NEXT_PUBLIC_APP_URL: "https://stackvault.example.com"

      # ── Protection admin Authentik ─────────────────────────────────────────
      # Emails autorisés à accéder à /admin (séparés par des virgules)
      ADMIN_EMAILS: "admin@example.com"

      # Headers transmis par Authentik via le reverse proxy
      AUTHENTIK_EMAIL_HEADER: "x-authentik-email"
      AUTHENTIK_USERNAME_HEADER: "x-authentik-username"

      # ── Next.js ───────────────────────────────────────────────────────────
      NODE_ENV: "production"
      NEXT_TELEMETRY_DISABLED: "1"
    labels:
      # Exemple de labels Traefik (adaptez selon votre setup)
      # traefik.enable: "true"
      # traefik.http.routers.stackvault.rule: "Host(`stackvault.example.com`)"
      # traefik.http.services.stackvault.loadbalancer.server.port: "3000"
      app: "stackvault"
